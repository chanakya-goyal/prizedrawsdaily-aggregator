name: Daily draw aggregator (full sweep + auto-expire)

# Daily, keyless, no-AI. Two steps:
#   1. SCRAPE every operator — render/flaresolverr (browser) AND woo/shopify (JSON API, full
#      catalogue) — gate them, and insert NEW live comps as `draft` rows in Supabase. Dedup by
#      entry_url means existing draws are refreshed/skipped, so this only ADDS genuinely-new comps.
#   2. AUTO-EXPIRE — mark any ACTIVE or draft draw whose competition has finished (is_purchasable
#      === false) as `status='ended'`, so the live site never shows a closed comp.
# Drafts still publish via review (the cowork QA / vision routine) — this keeps the inventory
# fresh and self-cleaning without auto-publishing unverified prizes.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC (08:00 BST) every day
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

concurrency:
  group: aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 90 # render + full woo/shopify catalogue sweep
    permissions:
      contents: read
    services:
      # Self-hosted Cloudflare solver for operators with "fetcher": "flaresolverr".
      # Keyless & free; reachable at http://localhost:8191 from the run step. No internal
      # health-cmd (the image lacks curl) — a wait step below polls it from the runner.
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        env:
          LOG_LEVEL: warning
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run parser/gate tests
        run: bun test

      - name: Install Chromium for Playwright
        run: bunx playwright install --with-deps chromium

      - name: Wait for FlareSolverr to be ready
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8191/health >/dev/null 2>&1 || curl -fsS http://localhost:8191/ >/dev/null 2>&1; then
              echo "FlareSolverr is up"; exit 0
            fi
            echo "waiting for FlareSolverr ($i/40)…"; sleep 3
          done
          echo "::warning::FlareSolverr did not become ready — flaresolverr operators will fail-safe to 0 draws"

      - name: Scrape all operators (render + woo/shopify) → gate → insert drafts
        run: bun run.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FLARESOLVERR_URL: http://localhost:8191/v1 # Cloudflare solver for flaresolverr operators
          DRY_RUN: "false"
          METHODS: "render,woo,shopify" # full daily sweep across every operator
          PUBLISH_STATUS: "draft" # land as draft; review/vision QA publishes (no unverified auto-publish)
          PER_OP: "5" # render per-op cap (browser cost)
          PER_OP_API: "60" # woo/shopify per-op cap (cheap JSON → whole live catalogue)
          BATCHES: "1"
          MAX_DRAWS: "3500" # backstop on pages read — covers all operators in one run

      - name: Auto-expire finished comps (active + draft) → status='ended'
        if: always() # run even if the scrape step partially failed, so the site stays clean
        run: bun ended-sweep.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: "false"
          STATUS: "active,draft" # expire LIVE comps that have finished, plus stale drafts
