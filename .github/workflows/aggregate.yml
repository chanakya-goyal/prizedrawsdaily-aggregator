name: Daily draw aggregator

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC (08:00 BST) every day
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

concurrency:
  group: aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      models: read # lets the built-in GITHUB_TOKEN call GitHub Models (free)
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Chromium for Playwright
        run: bunx playwright install --with-deps chromium

      - name: Run aggregator (publish new draws)
        run: bun run.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: "false"
          PUBLISH_STATUS: "active" # clean draws go live automatically; supervisor still holds suspicious ones as draft
          PER_OP: "6"
