name: Daily draw aggregator (render feeder)

# Browser-only feeder: scrapes the `render`-method operators (Playwright + try-harder),
# gates them, and inserts `draft` rows into Supabase. No AI / no API key. The cowork
# (Claude) routine scrapes the JSON-API operators and does all describe/QA/publish.

on:
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC (08:00 BST) every day
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

concurrency:
  group: aggregator
  cancel-in-progress: false

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run parser/gate tests
        run: bun test

      - name: Install Chromium for Playwright
        run: bunx playwright install --with-deps chromium

      - name: Run render feeder (scrape → gate → insert drafts)
        run: bun run.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: "false"
          METHODS: "render" # browser sites only; cowork handles woo/shopify
          PUBLISH_STATUS: "draft" # cowork publishes after describe + QA
          PER_OP: "5"
          BATCHES: "1" # no LLM quota → full coverage every day
          MAX_DRAWS: "500" # backstop on pages read
